<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LB Finance | Definir Nova Senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink:    #e01d8e;
      --purple:  #8b5cf6;
      --grad:    linear-gradient(135deg, #e01d8e 0%, #8b5cf6 100%);
      --border:  #e2e8f0;
      --text:    #1e293b;
      --muted:   #94a3b8;
      --subtle:  #64748b;
      --success: #10b981;
    }

    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #fff; color: var(--text);
    }

    /* ══════════════ LAYOUT ══════════════ */
    .page {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #fafbff; position: relative;
      overflow: hidden;
    }

    /* orbs suaves */
    .orb {
      position: absolute; border-radius: 50%; filter: blur(60px);
      animation: floatOrb var(--dur, 7s) ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(224,29,142,0.08); top: -100px; left: -100px; --dur: 8s; }
    .orb2 { width: 350px; height: 350px; background: rgba(139,92,246,0.09); bottom: -100px; right: -100px; --dur: 10s; }
    
    @keyframes floatOrb {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.1); }
    }

    .card {
      width: 100%; max-width: 420px; padding: 40px;
      background: #fff; border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(139,92,246,0.1);
      position: relative; z-index: 1;
      animation: slideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px; text-decoration: none; justify-content: center;
    }
    .logo .lb-box {
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(139,92,246,0.3);
    }
    .logo .lb-box img { width: 28px; height: 28px; object-fit: contain; filter: brightness(0) invert(1); }
    .logo span {
      font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 800;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .card-title {
      font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 900;
      color: var(--text); margin-bottom: 8px; text-align: center;
    }
    .card-sub {
      font-size: 0.9rem; color: var(--muted); margin-bottom: 32px;
      text-align: center; line-height: 1.5;
    }

    .f-group { position: relative; margin-bottom: 24px; }
    .f-group input {
      width: 100%; padding: 12px 0 8px;
      border: none; border-bottom: 1.5px solid var(--border);
      border-radius: 0; font-size: 1rem; color: var(--text);
      outline: none; font-family: 'Inter', sans-serif; background: transparent;
      transition: border-color 0.25s;
    }
    .f-group input::placeholder { color: transparent; }
    .f-group label {
      position: absolute; left: 0; top: 12px;
      font-size: 0.95rem; color: var(--muted); pointer-events: none;
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    .f-group input:focus + label,
    .f-group input:not(:placeholder-shown) + label {
      top: -12px; font-size: 0.75rem; color: var(--purple); font-weight: 600;
    }
    .f-group::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 1.5px; background: var(--grad);
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .f-group:focus-within::after { width: 100%; }

    .btn-submit {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: var(--grad); color: #fff;
      font-size: 0.95rem; font-weight: 700; letter-spacing: 0.04em;
      cursor: pointer; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 18px rgba(224,29,142,0.3);
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .btn-submit:hover:not(:disabled) {
      opacity: 0.95; transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(224,29,142,0.4);
    }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .s-spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-submit.loading .s-spinner { display: block; }
    .btn-submit.loading span { opacity: 0.7; }

    /* Success screen */
    .success-screen {
      display: none; text-align: center;
    }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 20px;
      background: rgba(16,185,129,0.1); display: flex; align-items: center; justify-content: center;
    }
    .success-icon svg { width: 32px; height: 32px; stroke: var(--success); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: #fff; border-radius: 12px;
      padding: 12px 24px; font-size: 0.875rem;
      pointer-events: none; opacity: 0;
      transition: all 0.3s; z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15); font-weight: 500;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error   { background: #ef4444; }
    .toast.success { background: var(--success); }
  </style>
</head>
<body>

<div class="page">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">
    <a href="login.html" class="logo">
      <div class="lb-box"><img src="logo (2).png" alt="LB"></div>
      <span>LB Finance</span>
    </a>

    <div id="reset-form">
      <h1 class="card-title">Nova Senha</h1>
      <p class="card-sub">Crie uma senha forte para proteger seu acesso.</p>

      <div class="f-group">
        <input type="password" id="new-password" placeholder=" " autocomplete="new-password">
        <label for="new-password">Nova senha</label>
      </div>

      <div class="f-group">
        <input type="password" id="confirm-password" placeholder=" " autocomplete="new-password">
        <label for="confirm-password">Confirmar nova senha</label>
      </div>

      <button class="btn-submit" id="btn-submit" onclick="handleReset()">
        <div class="s-spinner"></div>
        <span>DEFINIR SENHA</span>
      </button>
    </div>

    <div id="success-screen" class="success-screen">
      <div class="success-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
      </div>
      <h1 class="card-title">Senha alterada!</h1>
      <p class="card-sub">Sua senha foi redefinida com sucesso. Agora você já pode acessar sua conta.</p>
      <button class="btn-submit" onclick="window.location.href='login.html'">
        <span>FAZER LOGIN</span>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://ijaztxvquuhmcscylgzo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqYXp0eHZxdXVobWNzY3lsZ3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDk2NjksImV4cCI6MjA5MjAyNTY2OX0.sJDBshc0xFK21jukhdxi461z_loQDR509wOY-nrK514';
  const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  async function handleReset() {
    const pwd = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const btn = document.getElementById('btn-submit');

    if (!pwd || pwd.length < 6) {
      showToast('A senha deve ter pelo menos 6 caracteres.', 'error');
      return;
    }

    if (pwd !== confirm) {
      showToast('As senhas não coincidem.', 'error');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const { error } = await _sb.auth.updateUser({ password: pwd });
      if (error) throw error;

      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
    } catch (err) {
      showToast(err.message, 'error');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // Verifica se estamos vindo de um link de recuperação
  window.addEventListener('load', async () => {
    // Pequeno delay para garantir que o Supabase processe o hash da URL
    setTimeout(async () => {
      const { data: { session }, error } = await _sb.auth.getSession();
      
      if (error) {
        showToast('Erro ao validar sessão: ' + error.message, 'error');
        return;
      }

      if (!session) {
        showToast('Link de recuperação inválido, expirado ou você já o utilizou.', 'error');
        // Opcional: redirecionar após alguns segundos
        // setTimeout(() => { window.location.href = 'login.html'; }, 4000);
      } else {
        console.log('Sessão ativa para redefinição de senha:', session.user.email);
      }
    }, 500);
  });
</script>

</body>
</html>
